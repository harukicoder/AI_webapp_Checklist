<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Checklists">
    <title>Checklists</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m20 6-11 11-5-5"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h13"></path>
        <path d="M8 12h13"></path>
        <path d="M8 18h13"></path>
        <path d="M3 6h.01"></path>
        <path d="M3 12h.01"></path>
        <path d="M3 18h.01"></path>
      </symbol>
      <symbol id="icon-archive" viewBox="0 0 24 24">
        <path d="M3 7h18"></path>
        <path d="M5 7v13h14V7"></path>
        <path d="M9 11h6"></path>
        <path d="M8 3h8l2 4H6z"></path>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.38 1.08V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1.08-.38H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .38-1.08V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.37.35.7.6 1 .3.3.68.38 1.08.38H21a2 2 0 1 1 0 4h-.09A1.65 1.65 0 0 0 19.4 15Z"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 15H6L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <path d="M8 8h11v11H8z"></path>
        <path d="M5 16H4V5h11v1"></path>
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15.3 6.4L3 16"></path>
        <path d="M3 21v-5h5"></path>
        <path d="M3 12A9 9 0 0 1 18.3 5.6L21 8"></path>
        <path d="M16 8h5V3"></path>
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12"></path>
        <path d="m7 10 5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 21V9"></path>
        <path d="m7 14 5-5 5 5"></path>
        <path d="M5 3h14"></path>
      </symbol>
      <symbol id="icon-share" viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <path d="m8.6 10.6 6.8-4.2"></path>
        <path d="m8.6 13.4 6.8 4.2"></path>
      </symbol>
      <symbol id="icon-cloud" viewBox="0 0 24 24">
        <path d="M17.5 19H8a6 6 0 1 1 1.1-11.9A7 7 0 0 1 22 11.5 4 4 0 0 1 17.5 19Z"></path>
      </symbol>
      <symbol id="icon-users" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.35-4.35"></path>
        <circle cx="11" cy="11" r="7"></circle>
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M7 3v4"></path>
        <path d="M17 3v4"></path>
        <path d="M4 8h16"></path>
        <path d="M5 5h14v16H5z"></path>
      </symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Checklists</p>
          <h1 id="screenTitle">Today</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="topCloudButton" type="button" aria-label="Cloud sync" title="Cloud sync">
            <svg><use href="#icon-cloud"></use></svg>
          </button>
          <button class="icon-button install-button is-hidden" id="installButton" type="button" aria-label="Install app" title="Install app">
            <svg><use href="#icon-download"></use></svg>
          </button>
        </div>
      </header>

      <main class="content">
        <section class="view is-active" id="todayView" aria-labelledby="todayTab">
          <div id="welcomeDashboard"></div>

          <div class="toolbar">
            <label class="search">
              <svg aria-hidden="true"><use href="#icon-search"></use></svg>
              <input id="todaySearch" type="search" placeholder="Search checklists" autocomplete="off">
            </label>
            <button class="icon-button primary" id="newFromToday" type="button" aria-label="New checklist" title="New checklist">
              <svg><use href="#icon-plus"></use></svg>
            </button>
          </div>

          <div class="stats-grid" aria-live="polite">
            <div class="stat">
              <span id="statOpen">0</span>
              <p>Open</p>
            </div>
            <div class="stat">
              <span id="statDone">0%</span>
              <p>Done</p>
            </div>
            <div class="stat">
              <span id="statItems">0</span>
              <p>Items</p>
            </div>
          </div>

          <div class="active-checklist" id="activeChecklist"></div>
          <div class="list-stack" id="checklistList"></div>
        </section>

        <section class="view" id="buildView" aria-labelledby="buildTab">
          <form class="builder" id="checklistForm">
            <div class="field">
              <label for="checklistTitle">Checklist name</label>
              <input id="checklistTitle" name="title" type="text" placeholder="Trip packing, client onboarding, daily close..." required autocomplete="off">
            </div>

            <div class="form-grid">
              <div class="field">
                <label for="checklistArea">Area</label>
                <select id="checklistArea" name="area">
                  <option>Personal</option>
                  <option>Work</option>
                  <option>Home</option>
                  <option>Travel</option>
                  <option>Health</option>
                </select>
              </div>
              <div class="field">
                <label for="checklistDate">Target date</label>
                <input id="checklistDate" name="date" type="date">
              </div>
            </div>

            <fieldset class="field segmented-field">
              <legend>Mode</legend>
              <div class="segmented">
                <label>
                  <input type="radio" name="mode" value="once" checked>
                  <span>Once</span>
                </label>
                <label>
                  <input type="radio" name="mode" value="repeat">
                  <span>Repeat</span>
                </label>
                <label>
                  <input type="radio" name="mode" value="template">
                  <span>Template</span>
                </label>
              </div>
            </fieldset>

            <div class="field">
              <label for="checklistItems">Items</label>
              <textarea id="checklistItems" name="items" rows="8" placeholder="One item per line"></textarea>
            </div>

            <div class="template-strip" id="starterTemplates" aria-label="Starter templates"></div>

            <div class="action-row">
              <button class="button ghost" id="resetFormButton" type="reset">Clear</button>
              <button class="button primary" type="submit">Save checklist</button>
            </div>
          </form>
        </section>

        <section class="view" id="libraryView" aria-labelledby="libraryTab">
          <div class="toolbar">
            <label class="search">
              <svg aria-hidden="true"><use href="#icon-search"></use></svg>
              <input id="librarySearch" type="search" placeholder="Search library" autocomplete="off">
            </label>
          </div>
          <div class="list-stack" id="libraryList"></div>
        </section>

        <section class="view" id="settingsView" aria-labelledby="settingsTab">
          <div class="settings-list">
            <div class="setting-row actions">
              <div>
                <h2>Google cloud</h2>
                <p id="cloudAccountLabel">Local only</p>
              </div>
              <div class="setting-actions">
                <button class="button compact" id="cloudAuthButton" type="button">Sign in</button>
              </div>
            </div>
            <div class="setting-row actions">
              <div>
                <h2>Workspace</h2>
                <p id="workspaceLabel">Personal routines</p>
              </div>
              <div class="icon-actions">
                <button class="icon-button" id="joinWorkspaceButton" type="button" aria-label="Join workspace" title="Join workspace">
                  <svg><use href="#icon-users"></use></svg>
                </button>
                <button class="icon-button" id="shareWorkspaceButton" type="button" aria-label="Share workspace" title="Share workspace">
                  <svg><use href="#icon-share"></use></svg>
                </button>
              </div>
            </div>
            <div class="setting-row">
              <div>
                <h2>Color theme</h2>
                <p id="themeLabel">System</p>
              </div>
              <select id="themeSelect" aria-label="Color theme">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
            <div class="setting-row">
              <div>
                <h2>Completed items</h2>
                <p id="hideDoneLabel">Visible</p>
              </div>
              <label class="switch">
                <input id="hideCompletedToggle" type="checkbox">
                <span></span>
              </label>
            </div>
            <div class="setting-row actions">
              <div>
                <h2>Sync</h2>
                <p id="syncLabel">Send routines to another device</p>
              </div>
              <div class="icon-actions">
                <button class="icon-button" id="syncButton" type="button" aria-label="Create sync link" title="Create sync link">
                  <svg><use href="#icon-share"></use></svg>
                </button>
              </div>
            </div>
            <div class="setting-row actions">
              <div>
                <h2>Backup</h2>
                <p id="storageLabel">Stored on this device</p>
              </div>
              <div class="icon-actions">
                <button class="icon-button" id="exportButton" type="button" aria-label="Export data" title="Export data">
                  <svg><use href="#icon-download"></use></svg>
                </button>
                <label class="icon-button file-trigger" aria-label="Import data" title="Import data">
                  <svg><use href="#icon-upload"></use></svg>
                  <input id="importInput" type="file" accept="application/json,.json">
                </label>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="tabbar" aria-label="Primary">
        <button class="tab is-active" id="todayTab" type="button" data-view="today" aria-current="page">
          <svg><use href="#icon-check"></use></svg>
          <span>Today</span>
        </button>
        <button class="tab" id="buildTab" type="button" data-view="build">
          <svg><use href="#icon-plus"></use></svg>
          <span>Build</span>
        </button>
        <button class="tab" id="libraryTab" type="button" data-view="library">
          <svg><use href="#icon-archive"></use></svg>
          <span>Library</span>
        </button>
        <button class="tab" id="settingsTab" type="button" data-view="settings">
          <svg><use href="#icon-settings"></use></svg>
          <span>Settings</span>
        </button>
      </nav>
    </div>

    <dialog class="sheet" id="checklistDialog">
      <form method="dialog">
        <header>
          <h2 id="dialogTitle">Checklist</h2>
          <button class="icon-button" value="close" aria-label="Close" title="Close" type="submit">
            <svg><use href="#icon-plus"></use></svg>
          </button>
        </header>
      </form>
      <div id="dialogBody"></div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="firebase-config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
